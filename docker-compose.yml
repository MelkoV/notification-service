services:
  app:
    build:
      context: .
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: notification_service
      DB_PASSWORD: notification_service
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: notification_service
      RABBITMQ_PASSWORD: notification_service
      RABBITMQ_QUEUE: notifications.priority
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: sh -lc "composer install --no-interaction && php artisan key:generate --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  worker:
    build:
      context: .
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: notification_service
      DB_PASSWORD: notification_service
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: notification_service
      RABBITMQ_PASSWORD: notification_service
      RABBITMQ_QUEUE: notifications.priority
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: sh -lc "until [ -f vendor/autoload.php ]; do sleep 1; done; until php artisan package:discover --ansi; do sleep 1; done; php artisan notifications:consume"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_service -d notification_service"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq/Dockerfile
    environment:
      RABBITMQ_DEFAULT_USER: notification_service
      RABBITMQ_DEFAULT_PASS: notification_service
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  vendor:
