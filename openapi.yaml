openapi: 3.1.0
info:
  title: Notification Service API
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
paths:
  /notifications:
    post:
      summary: Create a mass notification batch
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, priority, message, recipient_ids]
              properties:
                channel:
                  type: string
                  enum: [email, sms]
                priority:
                  type: string
                  enum: [transactional, marketing]
                message:
                  type: string
                recipient_ids:
                  type: array
                  items:
                    type: string
                idempotency_key:
                  type: string
      responses:
        "202":
          description: Batch accepted
  /subscribers/{subscriberId}/notifications:
    get:
      summary: List delivery history for a subscriber
      parameters:
        - in: path
          name: subscriberId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification history
